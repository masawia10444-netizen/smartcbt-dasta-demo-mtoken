version: '3.9'
services:
  metabase:
    container_name: metabase
    image: metabase/metabase:v0.47.5
    restart: always
    depends_on:
      - postgres
    env_file:
      - .env
    volumes:
      - /var/www/metabase:/metabase-data
    ports:
      - 9092:3000

  postgres:
    container_name: postgres
    image: postgres:15.4
    restart: always
    env_file:
      - .env
    volumes:
      - /var/www/postgres:/var/lib/postgresql/data
    # ports:
    #   - '5432:5432'
    expose:
      - 5432

networks: 
  default: 
      name: network-stack