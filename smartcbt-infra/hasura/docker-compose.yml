version: "3.6"
services:
  postgres:
    container_name: postgres-graphql-engine
    image: postgres:15.4
    restart: always
    expose:
      - 5432
    volumes:
      - ./db_data:/var/lib/postgresql/data
    env_file:
      - .env
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "${POSTGRES_DB}"]
      interval: 1s
      timeout: 5s
      retries: 5
  
  graphql-engine:
    container_name: graphql-engine
    image: hasura/graphql-engine:v2.35.0
    ports:
      - "8080:8080"
    restart: always
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy

networks: 
  default: 
      name: network-stack